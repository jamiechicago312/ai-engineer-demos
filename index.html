<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <div class="profile-section">
                <img id="profile-avatar" src="" alt="Profile Avatar" class="avatar">
                <div class="profile-info">
                    <h1 id="profile-name">Loading...</h1>
                    <p id="profile-bio">Loading bio...</p>
                    <div class="profile-links">
                        <a id="profile-github" href="#" target="_blank">
                            <i class="fab fa-github"></i> GitHub
                        </a>
                        <a id="profile-blog" href="#" target="_blank" style="display: none;">
                            <i class="fas fa-blog"></i> Blog
                        </a>
                        <a id="profile-twitter" href="#" target="_blank" style="display: none;">
                            <i class="fab fa-twitter"></i> Twitter
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Stats Section -->
        <section class="stats-section">
            <h2>GitHub Stats</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-code-branch"></i>
                    <div class="stat-info">
                        <span class="stat-number" id="public-repos">0</span>
                        <span class="stat-label">Public Repos</span>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-users"></i>
                    <div class="stat-info">
                        <span class="stat-number" id="followers">0</span>
                        <span class="stat-label">Followers</span>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-user-friends"></i>
                    <div class="stat-info">
                        <span class="stat-number" id="following">0</span>
                        <span class="stat-label">Following</span>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-star"></i>
                    <div class="stat-info">
                        <span class="stat-number" id="total-stars">0</span>
                        <span class="stat-label">Total Stars</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Repositories Section -->
        <section class="repos-section">
            <h2>Featured Repositories</h2>
            <div class="repos-grid" id="repos-container">
                <!-- Repositories will be loaded here -->
            </div>
        </section>

        <!-- Recent Activity Section -->
        <section class="activity-section">
            <h2>Recent Activity</h2>
            <div class="activity-list" id="activity-container">
                <!-- Recent activity will be loaded here -->
            </div>
        </section>

        <!-- Configuration Section -->
        <section class="config-section">
            <h2>Configuration</h2>
            <div class="config-form">
                <label for="github-username">GitHub Username:</label>
                <input type="text" id="github-username" placeholder="Enter GitHub username">
                <button onclick="loadUserData()">Load Portfolio</button>
            </div>
        </section>
    </div>

    <footer class="footer">
        <p>&copy; 2024 Developer Portfolio. Built with GitHub API.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
